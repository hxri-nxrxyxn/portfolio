<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Simple, natural portrait placeholder in Stanford style -->
  <!-- Replace this file with your real headshot (200x200px, circular crop recommended) -->
  
  <!-- Background -->
  <rect width="200" height="200" rx="100" fill="#EAEAEA"/>
  
  <!-- Subtle shoulders suggestion -->
  <ellipse cx="100" cy="178" rx="56" ry="28" fill="#D5D5D4"/>
  
  <!-- Head silhouette -->
  <ellipse cx="100" cy="85" rx="40" ry="44" fill="#C0C0BF"/>
  
  <!-- Hair suggestion -->
  <ellipse cx="100" cy="65" rx="40" ry="32" fill="#979694"/>
  
  <!-- Face -->
  <ellipse cx="100" cy="90" rx="32" ry="34" fill="#D5D5D4"/>
  
  <!-- Eyes -->
  <ellipse cx="88" cy="86" rx="3" ry="2" fill="#767674"/>
  <ellipse cx="112" cy="86" rx="3" ry="2" fill="#767674"/>
  
  <!-- Subtle smile -->
  <path d="M90 98 Q100 105 110 98" stroke="#767674" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>
